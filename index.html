<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;-webkit-text-size-adjust:100%;}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#16a34a66;border-radius:4px}
input,select,textarea{outline:none;border:none;background:transparent;touch-action:manipulation;font-size:16px;-webkit-user-select:text;user-select:text;}
button{cursor:pointer;border:none;background:none;}
#bg-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none;}

/* ── NATIVE MODAL (100% outside React) ── */
#nm{display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);}

#nm-title{font-weight:800;font-size:17px;margin-bottom:18px;color:#1a2e1a;}
#nm.dark #nm-title{color:#e2e8f0;}
#nm-close{float:right;font-size:22px;color:#6b7280;cursor:pointer;line-height:1;background:none;border:none;margin-top:-2px;}

<script>
(function(){
  var c=document.getElementById('bg-canvas'),x=c.getContext('2d'),W,H,P=[],M={x:-999,y:-999};
  var EM=['🌾','🛒','🥬','🧅','🌿','🫙','🥥','🌽','🍚','🧂','🍋','🥦'];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();
  function mk(mx,my,b){return{x:mx!=null?mx:Math.random()*W,y:my!=null?my:H+40,vx:(Math.random()-.5)*.7,vy:b?-(Math.random()*3+2):-(Math.random()*.9+.3),sz:b?Math.random()*22+14:Math.random()*20+10,a:b?.9:Math.random()*.3+.12,r:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.05,life:1,dc:b?Math.random()*.015+.008:Math.random()*.003+.001,em:EM[Math.floor(Math.random()*EM.length)],w:Math.random()*Math.PI*2,ws:Math.random()*.02+.01};}
  for(var i=0;i<22;i++){var p=mk(Math.random()*W,Math.random()*H,false);p.life=Math.random();P.push(p);}
  function mv(ex,ey){M.x=ex;M.y=ey;if(Math.random()<.3)P.push(mk(ex+(Math.random()-.5)*40,ey+(Math.random()-.5)*40,true));}
  window.addEventListener('mousemove',function(e){mv(e.clientX,e.clientY);});
  window.addEventListener('touchmove',function(e){if(e.touches[0])mv(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  function burst(ex,ey){for(var i=0;i<7;i++)P.push(mk(ex+(Math.random()-.5)*60,ey+(Math.random()-.5)*60,true));}
  window.addEventListener('click',function(e){burst(e.clientX,e.clientY);});
  window.addEventListener('touchstart',function(e){if(e.touches[0])burst(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  setInterval(function(){if(P.length<50)P.push(mk(null,null,false));},700);
  function draw(){
    x.clearRect(0,0,W,H);
    // Background image shows through — canvas is transparent
    for(var i=0;i<P.length;i++)for(var j=i+1;j<P.length;j++){var dx=P[i].x-P[j].x,dy=P[i].y-P[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){x.beginPath();x.moveTo(P[i].x,P[i].y);x.lineTo(P[j].x,P[j].y);x.strokeStyle='rgba(22,163,74,'+(0.12*(1-d/130)*Math.min(P[i].life,P[j].life))+')';x.lineWidth=.8;x.stroke();}}
    for(var i=P.length-1;i>=0;i--){var p=P[i];p.w+=p.ws;p.x+=p.vx+Math.sin(p.w)*.5;p.y+=p.vy;p.r+=p.rv;p.life-=p.dc;var mdx=p.x-M.x,mdy=p.y-M.y,md=Math.sqrt(mdx*mdx+mdy*mdy);if(md<90&&md>0){p.x+=mdx/md*2;p.y+=mdy/md*2;}if(p.life<=0||p.y<-80){P.splice(i,1);continue;}x.save();x.globalAlpha=p.a*p.life;x.translate(p.x,p.y);x.rotate(p.r);x.font=p.sz+'px serif';x.textAlign='center';x.textBaseline='middle';x.fillText(p.em,0,0);x.restore();}
    requestAnimationFrame(draw);}
  draw();
})();
</script>

// ── VOICE BUTTON ──────────────────────────────────────────────────────────────
function VoiceButton({t,lang,onResult,accent}){
  const [on,setOn]=useState(false);const [err,setErr]=useState("");const rr={current:null};
  const go=()=>{
    if(on){rr.current&&rr.current.stop();setOn(false);return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setErr(t.micNotSupported);return;}
    setErr("");const r=new SR();r.lang=lang==="ta"?"ta-IN":"en-IN";r.interimResults=false;
    r.onstart=()=>setOn(true);r.onresult=e=>{onResult(e.results[0][0].transcript);setOn(false);};
    r.onerror=e=>{setOn(false);setErr(e.error==="not-allowed"?t.micDenied:e.error==="no-speech"?t.noSpeech:t.micNotSupported);};
    r.onend=()=>setOn(false);try{r.start();rr.current=r;}catch(e){setErr(t.micNotSupported);setOn(false);}
  };
  return <div>
    <button onClick={go} style={{background:on?"#ef4444":accent,color:"#fff",borderRadius:12,padding:"13px 20px",fontWeight:800,fontSize:15,width:"100%",transition:"all .2s",animation:on?"ring 1s infinite":"none",boxShadow:on?"0 0 0 4px rgba(239,68,68,0.3)":"0 4px 20px rgba(22,163,74,0.4)"}}>
      {on?"⏹ "+t.listening:t.voiceBtn}
    </button>
    {err&&<div style={{marginTop:8,padding:"10px 14px",background:"#fee2e2",color:"#dc2626",borderRadius:10,fontSize:13,fontWeight:600}}>{err}</div>}
  </div>;
}

  const inp={width:"100%",padding:"10px 13px",borderRadius:10,border:"1.5px solid "+bd,background:bg,color:text,fontSize:"16px",marginBottom:10,touchAction:"manipulation",WebkitUserSelect:"text",userSelect:"text"};
  const filtered=customers.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
  const selC=customers.find(c=>c.id===selId);
  const selDebt=selC?calcDebt(selC.id,transactions):0;
  const handleSave=()=>{
    if(!selId)return showToast(t.noCustomerSelected);
    const raw=(entry||voice).trim();if(!raw)return;
    const{amount,type,item}=extractFromText(raw);
    if(!amount)return showToast("❌ Amount இல்லை. எ.கா: rice 150");
    const tx={id:uid(),cid:selId,type,item,amount,date:todayStr()};
    const nTx=[...transactions,tx];setTransactions(nTx);
    const nd=calcDebt(selId,nTx);setCustomers(cs=>cs.map(c=>c.id===selId?{...c,status:nd<=0?"paid":"active"}:c));
    speak&&speak(amount+" rupees "+(type==="payment"?"payment":"credit")+" saved");
    setEntry("");setVoice("");showToast(t.entryAdded);
  };
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const mData=months.map((m,i)=>({label:m,val:transactions.filter(tx=>tx.type==="credit"&&new Date(tx.date).getMonth()===i).reduce((s,tx)=>s+tx.amount,0)}));
  const mMax=Math.max(...mData.map(m=>m.val),1);
  return <div style={{padding:20,maxWidth:1000,margin:"0 auto"}}>
    <h2 style={{fontSize:22,fontWeight:900,marginBottom:20,color:text}}>{t.dashboard}</h2>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:14,marginBottom:24}}>
      {[{icon:"💰",label:t.totalPending,val:fmt(totalDebt),c:"#ef4444"},{icon:"👥",label:t.totalCustomers,val:customers.length,c:accent},{icon:"⚠️",label:t.mostIndebted,val:mostIndebted?mostIndebted.name+" ("+fmt(Math.max(0,calcDebt(mostIndebted.id,transactions)))+")":"—",c:"#f59e0b"}]
        .map((s,i)=><div key={i} style={G(dark,{borderRadius:16,padding:"18px 20px"})}>
          <div style={{fontSize:28,marginBottom:6}}>{s.icon}</div>
          <div style={{fontSize:11,color:muted,fontWeight:600,marginBottom:3}}>{s.label}</div>
          <div style={{fontSize:18,fontWeight:900,color:s.c,wordBreak:"break-all"}}>{s.val}</div>
        </div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={G(dark,{borderRadius:16,padding:18})}>
          <h3 style={{fontWeight:800,marginBottom:12,fontSize:14,color:text}}>{t.selectCustomer}</h3>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.searchCustomer} style={inp}/>
          <div style={{maxHeight:170,overflowY:"auto"}}>
            {filtered.map(c=>{const d=calcDebt(c.id,transactions);const isSel=c.id===selId;
              return <div key={c.id} onClick={()=>{setSelId(c.id);speak&&speak(c.name+" pending "+Math.max(0,d)+" rupees");}}
                style={{padding:"9px 11px",borderRadius:10,marginBottom:3,cursor:"pointer",background:isSel?accentLight:"rgba(255,255,255,0.3)",border:"1.5px solid "+(isSel?accent:"transparent"),display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all .15s"}}>
                <div><div style={{fontWeight:700,fontSize:13,color:text}}>{c.name}</div><div style={{fontSize:11,color:muted}}>{c.phone}</div></div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:800,color:d>0?"#ef4444":accent,fontSize:13}}>{fmt(Math.max(0,d))}</div>
                  <span style={{fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:700,background:c.status==="paid"?"#dcfce7":"#fee2e2",color:c.status==="paid"?"#16a34a":"#dc2626"}}>{c.status==="paid"?t.paid:t.active}</span>
                </div>
              </div>;
            })}
          </div>
          {selC&&<div style={{marginTop:10,padding:"9px 13px",background:accentLight,borderRadius:10}}>
            <span style={{fontWeight:700,color:accent}}>{selC.name}</span>
            <span style={{marginLeft:8,color:muted,fontSize:12}}>{t.pendingAmount}: </span>
            <span style={{fontWeight:900,color:selDebt>0?"#ef4444":accent}}>{fmt(Math.max(0,selDebt))}</span>
          </div>}
        </div>
        <div style={G(dark,{borderRadius:16,padding:18})}>
          <h3 style={{fontWeight:800,marginBottom:12,fontSize:14,color:text}}>{t.addDebtEntry}</h3>
          <textarea value={entry} onChange={e=>setEntry(e.target.value)} placeholder={t.typeEntry} rows={3} style={{...inp,resize:"vertical",marginBottom:10}}/>
          <VoiceButton t={t} lang={lang} accent={accent} onResult={txt=>setVoice(txt)}/>
          {voice&&<div style={{marginTop:10,padding:"9px 13px",background:accentLight,borderRadius:10,fontSize:13}}>
            <span style={{color:muted,fontWeight:600}}>{t.voiceRecognized} </span><span style={{color:accent,fontWeight:700}}>{voice}</span>
          </div>}
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button onClick={handleSave} style={{flex:1,background:accent,color:"#fff",padding:"11px",borderRadius:10,fontWeight:800,fontSize:14,boxShadow:"0 4px 16px rgba(22,163,74,0.4)"}}>{t.saveEntry}</button>
            <button onClick={()=>{setEntry("");setVoice("");}} style={{padding:"11px 14px",borderRadius:10,border:"1.5px solid "+bd,color:muted,fontWeight:700,background:"rgba(255,255,255,0.5)"}}>{t.clear}</button>
          </div>
        </div>
      </div>
      <div style={G(dark,{borderRadius:16,padding:18})}>
        <h3 style={{fontWeight:800,marginBottom:16,fontSize:14,color:text}}>{t.monthlyTrend}</h3>
        <div style={{display:"flex",alignItems:"flex-end",gap:4,height:150,paddingBottom:4}}>
          {mData.map((m,i)=>{const h=Math.round((m.val/mMax)*130)||3;return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div title={fmt(m.val)} style={{width:"100%",height:h,background:"linear-gradient(180deg,#16a34a,#86efac)",borderRadius:"4px 4px 0 0",minHeight:3,transition:"height .6s"}}/>
            <span style={{fontSize:8,color:muted,fontWeight:600}}>{m.label}</span>
          </div>;})}
        </div>
        <div style={{marginTop:18}}>
          <div style={{fontWeight:700,fontSize:12,marginBottom:8,color:muted}}>Recent Transactions</div>
          {[...transactions].reverse().slice(0,5).map(tx=>{const c=customers.find(x=>x.id===tx.cid);
            return <div key={tx.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid "+bd}}>
              <div><div style={{fontWeight:700,fontSize:12,color:text}}>{c&&c.name||"?"}</div><div style={{fontSize:10,color:muted}}>{tx.item} · {tx.date}</div></div>
              <div style={{fontWeight:800,color:tx.type==="payment"?accent:"#ef4444",fontSize:13}}>{tx.type==="payment"?"+":"-"}{fmt(tx.amount)}</div>
            </div>;})}
        </div>
      </div>
    </div>
  </div>;
}

// ── CUSTOMERS PAGE ────────────────────────────────────────────────────────────
function CustomersPage({t,dark,accent,accentLight,text,muted,customers,setCustomers,transactions,setTransactions,showToast,speak}){
  const [search,setSearch]=useState("");const [filter,setFilter]=useState("all");
  const [viewC,setViewC]=useState(null);const [delId,setDelId]=useState(null);
  const [me,setMe]=useState({amount:"",item:"",type:"credit",date:todayStr()});
  const bd=dark?"rgba(70,90,120,0.5)":"rgba(187,247,208,0.9)";
  const bg=dark?"rgba(10,15,30,0.6)":"rgba(255,255,255,0.65)";
  const inp={width:"100%",padding:"10px 13px",borderRadius:10,border:"1.5px solid "+bd,background:bg,color:text,fontSize:"16px",marginBottom:10,touchAction:"manipulation"};
  const totalShop=customers.reduce((s,c)=>s+Math.max(0,calcDebt(c.id,transactions)),0);
  const filtered=customers.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
  const filterTx=txs=>{const now=new Date();return txs.filter(tx=>{const d=new Date(tx.date);if(filter==="today")return d.toDateString()===now.toDateString();if(filter==="week")return(now-d)/864e5<=7;if(filter==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();return true;});};
  const handleDel=id=>{if(delId===id){setCustomers(cs=>cs.filter(c=>c.id!==id));setTransactions(ts=>ts.filter(t=>t.cid!==id));setDelId(null);showToast(t.customerDeleted);}else{setDelId(id);setTimeout(()=>setDelId(null),3000);}};
  const addEntry=cid=>{if(!me.amount)return;const tx={id:uid(),cid,type:me.type,item:me.item||"Manual",amount:parseFloat(me.amount),date:me.date};const nTx=[...transactions,tx];setTransactions(nTx);const nd=calcDebt(cid,nTx);setCustomers(cs=>cs.map(c=>c.id===cid?{...c,status:nd<=0?"paid":"active"}:c));speak&&speak(tx.amount+" rupees saved");setMe({amount:"",item:"",type:"credit",date:todayStr()});showToast(t.entryAdded);};

  // ── Open native DOM modal (bypasses React entirely) ────────────────────────
  const openModal=(editData)=>{
    const nm=document.getElementById('nm');
    nm.classList.toggle('dark',dark);
    nm.classList.add('show');
    document.getElementById('nm-title').textContent=editData?t.edit:t.addCustomer;
    document.getElementById('nm-name').placeholder=t.name;
    document.getElementById('nm-phone').placeholder=t.phone;
    document.getElementById('nm-addr').placeholder=t.address;
    document.getElementById('nm-name').value=editData?editData.name:'';
    document.getElementById('nm-phone').value=editData?editData.phone:'';
    document.getElementById('nm-addr').value=editData?editData.address:'';
    document.getElementById('nm-save').textContent=t.save;
    document.getElementById('nm-cancel').textContent=t.cancel;
    document.getElementById('nm-save').onclick=()=>{
      const name=(document.getElementById('nm-name').value||'').trim();
      if(!name)return;
      const phone=document.getElementById('nm-phone').value||'';
      const address=document.getElementById('nm-addr').value||'';
      if(editData){setCustomers(cs=>cs.map(c=>c.id===editData.id?{...c,name,phone,address}:c));}
      else{setCustomers(cs=>[...cs,{id:uid(),name,phone,address,status:"active"}]);showToast(t.customerAdded);}
      nm.classList.remove('show');
    };
    setTimeout(()=>{const n=document.getElementById('nm-name');if(n){n.focus();n.selectionStart=n.selectionEnd=n.value.length;}},80);
  };

  if(viewC){
    const cTx=filterTx(transactions.filter(tx=>tx.cid===viewC.id));const debt=calcDebt(viewC.id,transactions);
    return <div style={{padding:20,maxWidth:680,margin:"0 auto"}}>
      <button onClick={()=>setViewC(null)} style={{color:accent,fontWeight:700,marginBottom:14,fontSize:14}}>{t.back}</button>
      <div style={G(dark,{borderRadius:16,padding:20,marginBottom:16})}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
          <div><h2 style={{fontWeight:900,fontSize:20,color:text}}>{viewC.name}</h2><div style={{color:muted,fontSize:13}}>📞 {viewC.phone} | 📍 {viewC.address}</div></div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:26,fontWeight:900,color:debt>0?"#ef4444":accent}}>{fmt(Math.max(0,debt))}</div>
            <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,fontWeight:700,background:viewC.status==="paid"?"#dcfce7":"#fee2e2",color:viewC.status==="paid"?"#16a34a":"#dc2626"}}>{viewC.status==="paid"?t.paid:t.active}</span>
          </div>
        </div>
      </div>
      <div style={G(dark,{borderRadius:16,padding:18,marginBottom:16})}>
        <h3 style={{fontWeight:800,marginBottom:12,fontSize:14,color:text}}>Add Entry</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <input value={me.amount} onChange={e=>setMe(m=>({...m,amount:e.target.value}))} placeholder={t.amount} type="number" style={inp}/>
          <input value={me.item} onChange={e=>setMe(m=>({...m,item:e.target.value}))} placeholder={t.item} style={inp}/>
          <input value={me.date} onChange={e=>setMe(m=>({...m,date:e.target.value}))} type="date" style={inp}/>
          <select value={me.type} onChange={e=>setMe(m=>({...m,type:e.target.value}))} style={{...inp,marginBottom:0}}><option value="credit">{t.credit}</option><option value="payment">{t.payment}</option></select>
        </div>
        <button onClick={()=>addEntry(viewC.id)} style={{marginTop:10,background:accent,color:"#fff",padding:"11px 22px",borderRadius:10,fontWeight:800,fontSize:14}}>{t.save}</button>
      </div>
      <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
        {["all","today","week","month"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"6px 14px",borderRadius:20,fontWeight:700,fontSize:12,background:filter===f?accent:"rgba(255,255,255,0.6)",color:filter===f?"#fff":muted,border:"1.5px solid "+bd}}>{t[f==="all"?"allDates":f==="today"?"today":f==="week"?"thisWeek":"thisMonth"]}</button>)}
      </div>
      <div style={G(dark,{borderRadius:16,overflow:"hidden"})}>
        <div style={{padding:"14px 18px",borderBottom:"1.5px solid "+bd,fontWeight:800,color:text}}>{t.transactions}</div>
        {cTx.length===0?<div style={{padding:28,textAlign:"center",color:muted}}>{t.noTransactions}</div>
          :cTx.map(tx=><div key={tx.id} style={{display:"flex",justifyContent:"space-between",padding:"12px 18px",borderBottom:"1px solid "+bd}}>
            <div><div style={{fontWeight:700,color:text}}>{tx.item}</div><div style={{fontSize:11,color:muted}}>{tx.date}</div></div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:700,background:tx.type==="payment"?"#dcfce7":"#fee2e2",color:tx.type==="payment"?"#16a34a":"#dc2626"}}>{tx.type==="payment"?t.payment:t.credit}</span>
              <span style={{fontWeight:900,color:tx.type==="payment"?accent:"#ef4444",fontSize:15}}>{tx.type==="payment"?"+":"-"}{fmt(tx.amount)}</span>
              <button onClick={()=>setTransactions(ts=>ts.filter(t=>t.id!==tx.id))} style={{color:"#ef4444",fontSize:15}}>🗑</button>
            </div>
          </div>)}
      </div>
    </div>;
  }

  return <div style={{padding:20,maxWidth:880,margin:"0 auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
      <div><h2 style={{fontSize:22,fontWeight:900,color:text}}>{t.customers}</h2><div style={{color:muted,fontSize:13}}>{t.totalShopDebt}: <strong style={{color:"#ef4444"}}>{fmt(totalShop)}</strong></div></div>
      <button onClick={()=>openModal(null)} style={{background:accent,color:"#fff",padding:"11px 20px",borderRadius:50,fontWeight:800,fontSize:13,boxShadow:"0 4px 16px rgba(22,163,74,0.4)"}}>+ {t.addCustomer}</button>
    </div>
    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.searchCustomer} style={{...inp,marginBottom:14}}/>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {filtered.map(c=>{const debt=calcDebt(c.id,transactions);
        return <div key={c.id} style={G(dark,{borderRadius:14,padding:"16px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10})}>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:2,color:text}}>{c.name}</div>
            <div style={{color:muted,fontSize:12}}>📞 {c.phone} · 📍 {c.address}</div>
            <div style={{marginTop:7}}><MiniBar value={Math.max(0,debt)} max={totalShop||1} color={debt>0?"#ef4444":"#16a34a"}/></div>
          </div>
          <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:7}}>
            <span style={{fontSize:20,fontWeight:900,color:debt>0?"#ef4444":accent}}>{fmt(Math.max(0,debt))}</span>
            <span style={{fontSize:10,padding:"2px 9px",borderRadius:20,fontWeight:700,background:c.status==="paid"?"#dcfce7":"#fee2e2",color:c.status==="paid"?"#16a34a":"#dc2626"}}>{c.status==="paid"?t.paid:t.active}</span>
            <div style={{display:"flex",gap:5}}>
              <button onClick={()=>setViewC(c)} style={{background:accentLight,color:accent,padding:"6px 12px",borderRadius:8,fontWeight:700,fontSize:11}}>{t.viewHistory}</button>
              <button onClick={()=>openModal(c)} style={{border:"1.5px solid "+bd,color:muted,padding:"6px 10px",borderRadius:8,fontWeight:700,fontSize:11,background:"rgba(255,255,255,0.5)"}}>{t.edit}</button>
              <button onClick={()=>handleDel(c.id)} style={{background:delId===c.id?"#dc2626":"#fee2e2",color:delId===c.id?"#fff":"#dc2626",padding:"6px 10px",borderRadius:8,fontWeight:700,fontSize:11,transition:"all .2s",minWidth:52}}>{delId===c.id?"Sure? 🗑":"🗑"}</button>
            </div>
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("welcome");const [lang,setLang]=useState("ta");const [dark,setDark]=useState(false);
  const [vf,setVf]=useState(true);const [tts,setTts]=useState(true);
  const [customers,setCustomersRaw]=useState(()=>loadLS('dg_customers',SEED_C));
  const [transactions,setTransactionsRaw]=useState(()=>loadLS('dg_transactions',SEED_T));
  // Wrap setters to auto-save to localStorage on every change
  const setCustomers=v=>{const next=typeof v==='function'?v(customers):v;saveLS('dg_customers',next);setCustomersRaw(next);};
  const setTransactions=v=>{const next=typeof v==='function'?v(transactions):v;saveLS('dg_transactions',next);setTransactionsRaw(next);};
  const [toast,setToast]=useState(null);const [selId,setSelId]=useState("");
  const t=T[lang];
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2800);};
  const speak=txt=>{if(!tts||!window.speechSynthesis)return;const u=new SpeechSynthesisUtterance(txt);u.lang=lang==="ta"?"ta-IN":"en-IN";window.speechSynthesis.speak(u);};
  const accent="#16a34a";const accentLight=dark?"#166534":"#dcfce7";
  const text=dark?"#e2e8f0":"#1a2e1a";const muted=dark?"#94a3b8":"#4b5563";
  const totalDebt=customers.reduce((s,c)=>s+Math.max(0,calcDebt(c.id,transactions)),0);
  const mostIndebted=customers.reduce((best,c)=>{const d=calcDebt(c.id,transactions);return d>(best?calcDebt(best.id,transactions):0)?c:best;},null);
  useEffect(()=>{const cv=document.getElementById('bg-canvas');if(cv)cv.style.opacity=dark?"0.55":"1";},[dark]);
  return <div style={{minHeight:"100vh",background:dark?"rgba(8,14,28,0.78)":"rgba(255,255,255,0.12)",color:text,fontFamily:"'Segoe UI',Arial,sans-serif",transition:"background .3s"}}>
    {toast&&<Toast msg={toast}/>}
    {page==="welcome"
      ?<WelcomePage t={t} dark={dark} accent={accent} muted={muted} onNext={()=>setPage("dashboard")}/>
      :<div style={{display:"flex",minHeight:"100vh"}}>
        <Sidebar t={t} dark={dark} accent={accent} accentLight={accentLight} text={text} muted={muted} page={page} setPage={setPage} totalDebt={totalDebt}/>
        <div style={{flex:1,overflowY:"auto"}}>
          {page==="dashboard"&&<DashboardPage t={t} dark={dark} accent={accent} accentLight={accentLight} text={text} muted={muted} customers={customers} transactions={transactions} setTransactions={setTransactions} setCustomers={setCustomers} selId={selId} setSelId={setSelId} totalDebt={totalDebt} mostIndebted={mostIndebted} showToast={showToast} speak={speak} lang={lang}/>}
          {page==="customers"&&<CustomersPage t={t} dark={dark} accent={accent} accentLight={accentLight} text={text} muted={muted} customers={customers} setCustomers={setCustomers} transactions={transactions} setTransactions={setTransactions} showToast={showToast} speak={speak}/>}
          {page==="settings"&&<SettingsPage t={t} dark={dark} setDark={setDark} lang={lang} setLang={setLang} accent={accent} accentLight={accentLight} text={text} muted={muted} vf={vf} setVf={setVf} tts={tts} setTts={setTts}/>}
        </div>
      </div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
